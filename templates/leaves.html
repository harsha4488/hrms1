{% extends "base.html" %}

{% block content %}

<div class="card">
    <h2>My Leaves</h2>

    <table border="1" width="100%">
        <tr>
            <th>Date</th>
            <th>Status</th>
        </tr>

        {% for leave in leaves %}
        <tr>
            <td>{{ leave.date }}</td>
            <td>{{ leave.status }}</td>
        </tr>
        {% endfor %}

    </table>
</div>

{% endblock %}
